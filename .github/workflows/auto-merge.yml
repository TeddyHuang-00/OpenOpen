name: Auto-Merge by Vote

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: read            # Needed to read reactions on PRs

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Auto-merge best PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { execSync } = require('child_process');

            // 1. Fetch all open PRs
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', sort: 'created', direction: 'desc' }
            );

            if (prs.length === 0) {
              console.log('No open PRs. Nothing to do.');
              return;
            }

            console.log(`Found ${prs.length} open PR(s)`);

            // 2. Score each PR by Bayesian posterior mean
            const scored = [];
            for (const pr of prs) {
              const { data: reactions } = await github.rest.reactions.listForIssue({
                owner,
                repo,
                issue_number: pr.number,
              });

              let thumbsUp = 0;
              let thumbsDown = 0;
              for (const r of reactions) {
                if (r.content === '+1') thumbsUp++;
                if (r.content === '-1') thumbsDown++;
              }

              // Beta(up+1, down+1) → E[p] = (up+1)/(up+down+2)
              const score = (thumbsUp + 1) / (thumbsUp + thumbsDown + 2);

              console.log(
                `  PR #${pr.number} "${pr.title}" — 👍${thumbsUp} 👎${thumbsDown} → score=${score.toFixed(3)} [${pr.html_url}]`
              );

              scored.push({ pr, thumbsUp, thumbsDown, score });
            }

            // 3. Sort by score descending
            scored.sort((a, b) => b.score - a.score);

            // 4. Filter: score >= 0.5
            const eligible = scored.filter(s => s.score >= 0.5);
            if (eligible.length === 0) {
              console.log('No PR meets the 0.5 score threshold. Nothing to merge.');
              return;
            }
            console.log(`${eligible.length} PR(s) above score threshold`);

            // Helper: git-based squash merge.
            // Only used as fallback for workflow file PRs where GITHUB_TOKEN
            // lacks workflow scope to enable auto-merge.
            const gitSquashMerge = (prNumber, commitTitle) => {
              const branch = `pr-${prNumber}`;
              execSync(`git fetch origin pull/${prNumber}/head:${branch}`, { stdio: 'inherit' });
              execSync(`git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" merge --squash ${branch}`, { stdio: 'inherit' });
              const safeTitle = commitTitle.replace(/\"/g, '\\"').replace(/`/g, '\\`');
              execSync(
                `git -c user.name="github-actions[bot]" ` +
                `-c user.email="github-actions[bot]@users.noreply.github.com" ` +
                `commit -m "${safeTitle}"`,
                { stdio: 'inherit' }
              );
              execSync(`git push origin HEAD:main`, { stdio: 'inherit' });
              try { execSync(`git branch -D ${branch}`, { stdio: 'ignore' }); } catch {}
            };

            // 5. Try auto-merge + approve on the best PR
            for (const { pr, score, thumbsUp, thumbsDown } of eligible) {
              console.log(`\nTrying PR #${pr.number} (score=${score.toFixed(3)})...`);

              const { data: fresh } = await github.rest.pulls.get({
                owner, repo, pull_number: pr.number,
              });

              if (fresh.merged) {
                console.log(`  Already merged. Skipping.`);
                continue;
              }

              if (fresh.mergeable === false) {
                console.log(`  Has conflicts (mergeable=false). Skipping.`);
                continue;
              }

              // Enable auto-merge via GraphQL.
              // Works for fork PRs and same-repo PRs.
              // Does NOT work for PRs that modify .github/workflows/ files
              // (GITHUB_TOKEN lacks workflow scope) — those fall back to git.
              try {
                await github.graphql(
                  `mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $prId,
                      mergeMethod: SQUASH
                    }) {
                      clientMutationId
                    }
                  }`,
                  { prId: fresh.node_id }
                );
                console.log(`  ✅ Auto-merge enabled`);
              } catch (err) {
                // Workflow file PRs: GITHUB_TOKEN lacks workflow scope
                // to enable auto-merge. Fall back to git-based merge.
                if (err.message.includes('without workflows permission') ||
                    err.message.includes('refusing to allow')) {
                  console.log(`  Auto-merge blocked (workflow file). Falling back to git merge...`);
                  const commitTitle = `Auto-merge: ${pr.title} (👍${thumbsUp}/👎${thumbsDown})`;
                  try {
                    gitSquashMerge(pr.number, commitTitle);
                    console.log(`  ✅ MERGED via git! PR #${pr.number}`);

                    // Explain the fallback on the PR
                    await github.rest.issues.createComment({
                      owner, repo,
                      issue_number: pr.number,
                      body: `Merged via git push because this PR modifies \`.github/workflows/\` files.\n\nGitHub's \`GITHUB_TOKEN\` lacks the \`workflows\` scope, so auto-merge cannot be enabled for workflow file PRs. This is a [known GitHub limitation](https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token).\n\nThe changes have been pushed directly to \`main\` via git using the \`WORKFLOW_TOKEN\` PAT.`
                    });

                    await github.rest.pulls.update({
                      owner, repo, pull_number: pr.number, state: 'closed'
                    });
                    console.log(`  🧹 Closed PR #${pr.number}`);
                  } catch (gitErr) {
                    console.log(`  ❌ Git merge failed: ${gitErr.message}`);
                    try { execSync('git merge --abort', { stdio: 'ignore' }); } catch {}
                    try { execSync('git reset --hard origin/main', { stdio: 'ignore' }); } catch {}
                    try { execSync(`git branch -D pr-${pr.number}`, { stdio: 'ignore' }); } catch {}
                  }
                  return;
                }

                console.log(`  ❌ Could not enable auto-merge: ${err.message}`);
                continue;
              }

              // Submit approving review.
              // Satisfies branch protection requirements when present.
              try {
                await github.rest.pulls.createReview({
                  owner, repo,
                  pull_number: pr.number,
                  event: 'APPROVE',
                  body: `Auto-approved by community vote (👍${thumbsUp}/👎${thumbsDown}, score=${score.toFixed(3)}).`
                });
                console.log(`  ✅ Approved. GitHub will auto-merge when requirements are met.`);
              } catch (err) {
                console.log(`  ⚠️ Could not submit review: ${err.message}`);
              }

              return;  // One per run — stop after first success
            }

            console.log('\nNo PR could be merged this cycle.');
