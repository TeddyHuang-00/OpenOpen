name: Auto-Merge by Vote

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: read            # Needed to read reactions on PRs

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Auto-merge best PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Fetch all open PRs
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', sort: 'created', direction: 'desc' }
            );

            if (prs.length === 0) {
              console.log('No open PRs. Nothing to do.');
              return;
            }

            console.log(`Found ${prs.length} open PR(s)`);

            // 2. Score each PR by (👍+1)/(👎+1)
            const scored = [];
            for (const pr of prs) {
              // Fetch reactions on the PR body (issue comment #1 is the PR body)
              // Reactions are on the issue, not the PR directly
              const { data: reactions } = await github.rest.reactions.listForIssue({
                owner,
                repo,
                issue_number: pr.number,
              });

              let thumbsUp = 0;
              let thumbsDown = 0;
              for (const r of reactions) {
                if (r.content === '+1') thumbsUp++;
                if (r.content === '-1') thumbsDown++;
              }

              // Bayesian posterior mean: Beta(up+1, down+1) → E[p] = (up+1)/(up+down+2)
              const score = (thumbsUp + 1) / (thumbsUp + thumbsDown + 2);

              console.log(
                `  PR #${pr.number} "${pr.title}" — 👍${thumbsUp} 👎${thumbsDown} → score=${score.toFixed(3)} [${pr.html_url}]`
              );

              scored.push({ pr, thumbsUp, thumbsDown, score });
            }

            // 3. Sort by score descending
            scored.sort((a, b) => b.score - a.score);

            // 4. Filter out PRs with score < 0.5 (more downvotes than upvotes)
            const eligible = scored.filter(s => s.score >= 0.5);
            if (eligible.length === 0) {
              console.log('No PR meets the 0.5 score threshold. Nothing to merge.');
              return;
            }
            console.log(`${eligible.length} PR(s) above score threshold`);

            // Helper: git-based squash merge for fork PRs where
            // GITHUB_TOKEN can't call pulls.merge across fork boundaries.
            const gitSquashMerge = (prNumber, commitTitle) => {
              const branch = `pr-${prNumber}`;
              execSync(`git fetch origin pull/${prNumber}/head:${branch}`, { stdio: 'inherit' });
              execSync(`git merge --squash ${branch}`, { stdio: 'inherit' });
              const safeTitle = commitTitle.replace(/"/g, '\\"').replace(/`/g, '\\`');
              execSync(
                `git -c user.name="github-actions[bot]" ` +
                `-c user.email="github-actions[bot]@users.noreply.github.com" ` +
                `commit -m "${safeTitle}"`,
                { stdio: 'inherit' }
              );
              execSync(`git push origin HEAD:main`, { stdio: 'inherit' });
              try { execSync(`git branch -D ${branch}`, { stdio: 'ignore' }); } catch {}
            };

            // 5. Try to merge from best to worst
            for (const { pr, score } of eligible) {
              console.log(`\nTrying PR #${pr.number} (score=${score.toFixed(3)})...`);

              // Check mergeability
              const { data: fresh } = await github.rest.pulls.get({
                owner, repo, pull_number: pr.number,
              });

              if (fresh.merged) {
                console.log(`  Already merged. Skipping.`);
                continue;
              }

              if (!fresh.mergeable) {
                console.log(`  Has conflicts or not mergeable (mergeable=${fresh.mergeable}). Skipping.`);
                continue;
              }

              const commitTitle = `Auto-merge: ${pr.title} (👍${pr.thumbsUp}/👎${pr.thumbsDown})`;

              // Merge it!
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: commitTitle,
                });
                console.log(`  ✅ MERGED via API! PR #${pr.number} — "${pr.title}"`);

                // Clean up branch if it's from the same repository (not a fork)
                if (fresh.head.repo && fresh.head.repo.full_name === `${owner}/${repo}`) {
                  try {
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `heads/${fresh.head.ref}`,
                    });
                    console.log(`  🧹 Deleted branch: ${fresh.head.ref}`);
                  } catch (delErr) {
                    console.log(`  ⚠️ Could not delete branch ${fresh.head.ref}: ${delErr.message}`);
                  }
                }

                return;  // One per run — stop after first success
              } catch (err) {
                // Fork PRs: GITHUB_TOKEN can't call pulls.merge across fork
                // boundaries (GitHub security restriction).
                // Workflow PRs: GITHUB_TOKEN lacks workflow scope to modify
                // .github/workflows/ files via API.
                // In both cases, fall back to git-based merge using the PAT
                // from checkout (which has workflow scope).
                if (err.message.includes('Resource not accessible by integration') ||
                    err.message.includes('refusing to allow')) {
                  console.log(`  API merge blocked. Falling back to git merge...`);

                  try {
                    gitSquashMerge(pr.number, commitTitle);
                    console.log(`  ✅ MERGED via git! PR #${pr.number} — "${pr.title}"`);
                    return;  // One per run — stop after first success
                  } catch (gitErr) {
                    console.log(`  ❌ Git merge failed: ${gitErr.message}`);
                    // Clean up git state for the next attempt
                    try { execSync('git merge --abort', { stdio: 'ignore' }); } catch {}
                    try { execSync('git reset --hard origin/main', { stdio: 'ignore' }); } catch {}
                    try { execSync(`git branch -D pr-${pr.number}`, { stdio: 'ignore' }); } catch {}
                  }
                } else {
                  console.log(`  ❌ Merge failed: ${err.message}`);
                }
              }
            }

            console.log('\nNo PR could be merged this cycle.');
