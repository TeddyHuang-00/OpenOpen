name: Validate Workflow Syntax

on:
  pull_request_target:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write   # Enable inline PR annotations

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: devops-actions/actionlint@v0.1.12
